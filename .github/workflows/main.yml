name: Inject Dylib into IPA

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'URL to the IPA file'
        required: true
      dylib_url:
        description: 'URL to the .dylib file'
        required: true

jobs:
  inject:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew update
          # coreutils provides a standard realpath which Azule needs
          brew install libplist xmlstarlet libxml2 jq curl git zip unzip xz zstd gzip bzip2 coreutils

      - name: Setup Azule
        run: |
          git clone https://github.com/Al4ise/Azule ~/Azule
          chmod +x ~/Azule/azule

      - name: Download Files
        run: |
          curl -L "${{ github.event.inputs.ipa_url }}" -o original.ipa
          curl -L "${{ github.event.inputs.dylib_url }}" -o tweak.dylib

      - name: Inject Dylib
        run: |
          # Define absolute paths
          IPA_PATH="$(pwd)/original.ipa"
          TWEAK_PATH="$(pwd)/tweak.dylib"
          # Azule requires -o to be a directory, not a filename
          OUT_DIR="$(pwd)/output"
          
          mkdir -p "$OUT_DIR"
          
          # Run Azule
          ~/Azule/azule -i "$IPA_PATH" -f "$TWEAK_PATH" -o "$OUT_DIR"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: modified-ipa
          # Azule names the file automatically (e.g., original_patched.ipa)
          # We upload everything inside the output folder
          path: output/*.ipa
